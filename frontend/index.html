    <script>
      (function () {
        var applyLightMode = function () {
          document.documentElement.classList.remove('dark');
          document.documentElement.setAttribute('data-theme', 'light');
          document.documentElement.style.colorScheme = 'only light';
          if (document.body) {
            document.body.classList.remove('dark');
            document.body.style.colorScheme = 'only light';
          }
        };
        applyLightMode();
        window.__TAKHET_FORCE_LIGHT_MODE__ = applyLightMode;
        try {
          window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyLightMode);
        } catch (error) {
          try {
            window.matchMedia('(prefers-color-scheme: dark)').addListener(applyLightMode);
          } catch (fallbackError) {}
        }
      })();
    </script>
